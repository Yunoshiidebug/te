<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanok → Olsztyn</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Pacifico&display=swap" rel="stylesheet">

<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Orbitron', sans-serif;
    background: url("https://i.imgur.com/xju9V1k.jpeg") center/cover no-repeat;
    color: white;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 0;
  }

  /* 🔒 LOCK FULL SCREEN */
  #lockScreen {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    background: #000;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 999;
    text-align: center;
    padding: 20px;
  }

  .ready-text {
    font-size: 20px;
    color: #00ff88;
    margin-bottom: 10px;
  }

  #lockText {
    margin-bottom: 20px;
    font-size: 22px;
  }

  .slider {
    width: 80%;
    max-width: 320px;
    height: 60px;
    background: #222;
    border-radius: 30px;
    position: relative;
    overflow: hidden;
  }

  .fill {
    position: absolute;
    left: 0;
    top: 0;
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00ff66, #00cc55, #00aa44);
  }

  .handle {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    position: absolute;
    top: 5px;
    left: 5px;
    font-size: 22px;
    cursor: pointer;
    background: transparent;
    touch-action: none;
  }

  /* 🚀 CONTENT */
  .content {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
  }

  .title {
    font-size: 54px;
    font-family: 'Pacifico', cursive;
    text-shadow: 0 0 4px #00cc55;
    margin-bottom: 20px;
  }

  .section-label {
    font-size: 18px;
    color: #ddd;
    margin: 10px 0;
  }

  .timer-main {
    font-size: 22px;
    color: #66ffcc;
  }

  .timer-detail {
    font-size: 16px;
    color: #33ff99;
  }

  .timer-main-strong {
    font-size: 20px;
    color: #00ff00;
  }

  /* 🎉 TOP */
  .top-title {
    position: absolute;
    top: 15px;
    width: 100%;
    text-align: center;
    font-size: 56px;
    font-family: 'Pacifico', cursive;
    color: #000;
    z-index: 10;
    display: none;

    text-shadow: 0 0 3px #00cc55;
  }

  /* 🌿 EMOTKI */
  .particle {
    position: fixed;
    pointer-events: none;
    z-index: 1;
    animation: float 7s linear forwards;
  }

  @keyframes float {
    from { transform: translate(0,0); opacity: 0.2; }
    to { transform: translate(var(--x), var(--y)); opacity: 0; }
  }
</style>
</head>

<body>

<div id="lockScreen">
  <div class="ready-text">Gotowa?</div>
  <div id="lockText">Przeciągnij w prawo ➡️</div>

  <div class="slider" id="slider">
    <div class="fill" id="fill"></div>
    <div class="handle" id="handle">➡️</div>
  </div>
</div>

<div class="top-title" id="topTitle">Majówka 2026</div>

<div class="content" id="content">

  <div class="title">Sanok → Olsztyn</div>

  <div class="section-label">Do autobusiku zostało</div>
  <div class="timer-main-strong" id="busMain"></div>
  <div class="timer-detail" id="busDetail"></div>

  <div class="section-label">A zobaczymy się dokładnie zaaa</div>
  <div class="timer-main" id="timerMain"></div>
  <div class="timer-detail" id="timerDetail"></div>

</div>

<script>
const busDate = new Date(2026, 3, 28, 23, 55);
const targetDate = new Date(2026, 3, 29, 10, 30);

/* ⏱️ TIMER */
function updateTimer(target, mainId, detailId) {
  const now = new Date();
  const diff = target - now;

  const hours = Math.floor(diff / 1000 / 60 / 60);
  const minutes = Math.floor(diff / 1000 / 60 % 60);

  const days = Math.floor(diff / 1000 / 60 / 60 / 24);
  const remHours = Math.floor(diff / 1000 / 60 / 60 % 24);
  const remMinutes = Math.floor(diff / 1000 / 60 % 60);
  const remSeconds = Math.floor(diff / 1000 % 60);

  document.getElementById(mainId).innerText =
    `Zostało ${hours}h ${minutes}m`;

  document.getElementById(detailId).innerText =
    `${days} dni ${remHours}h ${remMinutes}m ${remSeconds}s`;
}

setInterval(() => {
  updateTimer(busDate, "busMain", "busDetail");
  updateTimer(targetDate, "timerMain", "timerDetail");
}, 1000);

/* 🔒 SLIDER FIX (MOBILE + DESKTOP) */
const handle = document.getElementById("handle");
const slider = document.getElementById("slider");
const fill = document.getElementById("fill");

const lock = document.getElementById("lockScreen");
const content = document.getElementById("content");
const topTitle = document.getElementById("topTitle");

let dragging = false;

handle.addEventListener("pointerdown", (e) => {
  dragging = true;
  handle.setPointerCapture(e.pointerId);
});

handle.addEventListener("pointerup", () => dragging = false);
handle.addEventListener("pointercancel", () => dragging = false);

handle.addEventListener("pointermove", (e) => {
  if (!dragging) return;

  const rect = slider.getBoundingClientRect();
  let x = e.clientX - rect.left;

  const max = slider.offsetWidth - handle.offsetWidth;

  if (x < 0) x = 0;
  if (x > max) x = max;

  handle.style.left = x + "px";
  fill.style.width = (x / max) * 100 + "%";

  if (x >= max - 5) {
    dragging = false;
    lock.style.display = "none";
    content.style.display = "flex";
    topTitle.style.display = "block";
  }
});

/* 🌿 EMOTKI */
const emojis = ["🚆","🚍","❤️","💖","🥰","🫶","✨","🌿"];

function spawn() {
  const el = document.createElement("div");
  el.className = "particle";
  el.innerText = emojis[Math.floor(Math.random() * emojis.length)];

  el.style.fontSize = (16 + Math.random() * 16) + "px";
  el.style.left = Math.random() * window.innerWidth + "px";
  el.style.top = Math.random() * window.innerHeight + "px";

  el.style.setProperty("--x", (Math.random() - 0.5) * 300 + "px");
  el.style.setProperty("--y", (Math.random() - 0.5) * 300 + "px");

  document.body.appendChild(el);
  setTimeout(() => el.remove(), 7000);
}

setInterval(spawn, 100);
</script>

</body>
</html>
